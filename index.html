<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 WolvePack - Run With Your Pack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1b4e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff6b35;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #ff6b35;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .wolf-name-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff6b35;
            color: white;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .wolf-name-input::placeholder {
            color: #666;
        }

        .wolves-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            min-height: 150px;
            align-items: center;
        }

        .wolf {
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        .wolf:nth-child(1) {
            animation-delay: 0s;
        }

        .wolf:nth-child(2) {
            animation-delay: 0.5s;
        }

        .wolf:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .wolf-emoji {
            font-size: 60px;
            margin-bottom: 5px;
        }

        .wolf-message {
            font-size: 12px;
            color: #ff6b35;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 107, 53, 0.3);
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats-box {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid #ff6b35;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
        }

        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: #aaa;
            font-size: 14px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b35;
        }

        .progress-bar {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35 0%, #ff8555 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8555 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 107, 53, 0.2);
            border: 1px solid #ff6b35;
            color: #ff6b35;
        }

        .btn-secondary:hover {
            background: rgba(255, 107, 53, 0.3);
        }

        .pack-message {
            background: rgba(100, 200, 255, 0.1);
            border-left: 3px solid #64c8ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #64c8ff;
            text-align: center;
            font-weight: bold;
        }

        .manual-entry {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid #ff6b35;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .manual-entry h3 {
            color: #ff6b35;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #ff6b35;
            color: white;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: #666;
        }

        .input-group button {
            padding: 10px 15px;
            background: #ff6b35;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .input-group button:hover {
            background: #ff8555;
        }

        .leaderboard {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid #ff6b35;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .leaderboard h3 {
            color: #ff6b35;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 8px;
            border-radius: 5px;
            font-size: 13px;
        }

        .leaderboard-item.you {
            background: rgba(255, 107, 53, 0.3);
            font-weight: bold;
        }

        .share-code {
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid #64c8ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .share-code h3 {
            color: #64c8ff;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .code-display {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 16px;
            color: #64c8ff;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .code-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .code-buttons button {
            padding: 8px 15px;
            background: #64c8ff;
            border: none;
            color: #000;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        .code-buttons button:hover {
            background: #82d4ff;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.3);
        }

        .tab-btn {
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: #aaa;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #ff6b35;
            border-bottom-color: #ff6b35;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐺 WolvePack</h1>
            <input type="text" id="wolfName" class="wolf-name-input" placeholder="Your wolf name..." maxlength="20">
        </div>

        <div class="wolves-container">
            <div class="wolf">
                <div class="wolf-emoji">🐺</div>
                <div class="wolf-message" id="wolf1Msg">HUNT!</div>
            </div>
            <div class="wolf">
                <div class="wolf-emoji">🐺</div>
                <div class="wolf-message" id="wolf2Msg">MOVE!</div>
            </div>
            <div class="wolf">
                <div class="wolf-emoji">🐺</div>
                <div class="wolf-message" id="wolf3Msg">CRUSH!</div>
            </div>
        </div>

        <div class="pack-message" id="packMsg">💚 Your pack believes in you!</div>

        <div class="stats-box">
            <div class="stat-row">
                <div class="stat-label">Today's Steps</div>
                <div class="stat-value" id="stepsCount">0</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div style="text-align: right; font-size: 12px; color: #aaa; margin-top: 5px;">
                <span id="progressPercent">0%</span> of 10,000
            </div>
        </div>

        <div class="buttons-container">
            <button class="btn btn-primary" onclick="openSync()">🔄 Sync with Google Fit</button>
            <button class="btn btn-secondary" onclick="resetSteps()">Reset</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('home')">🏠 Home</button>
            <button class="tab-btn" onclick="switchTab('log')">📝 Log Steps</button>
            <button class="tab-btn" onclick="switchTab('pack')">👥 Pack</button>
        </div>

        <div id="home-tab" class="tab-content active">
            <div class="leaderboard">
                <h3>🏆 Pack Leaderboard</h3>
                <div id="leaderboard"></div>
            </div>

            <div class="share-code">
                <h3>📤 Share Your Code</h3>
                <p style="font-size: 12px; margin-bottom: 10px; color: #aaa;">Friends can compare steps using this code:</p>
                <div class="code-display" id="yourCode">CODE</div>
                <div class="code-buttons">
                    <button onclick="copyCode()">Copy</button>
                    <button onclick="shareCode()">Share</button>
                </div>
            </div>
        </div>

        <div id="log-tab" class="tab-content">
            <div class="manual-entry">
                <h3>📝 Log Your Steps</h3>
                <p style="font-size: 12px; margin-bottom: 10px; color: #aaa;">Add steps manually:</p>
                <div class="input-group">
                    <input type="number" id="stepInput" placeholder="Number of steps" min="0">
                    <button onclick="addSteps()">Add</button>
                </div>
            </div>
        </div>

        <div id="pack-tab" class="tab-content">
            <div class="pack-message" style="margin-bottom: 20px;">
                <h3 style="margin-bottom: 10px;">🐺 Your Pack Messages</h3>
                <div id="packMessages" style="text-align: left; font-size: 13px; line-height: 1.8;"></div>
            </div>
        </div>
    </div>

    <script>
        const GOAL = 10000;

        // Initialize on load
        window.addEventListener('load', () => {
            loadWolfName();
            loadSteps();
            updateLeaderboard();
            updatePackMessages();
            setInterval(updatePackMessages, 5000);
        });

        // Wolf name management
        function loadWolfName() {
            const saved = localStorage.getItem('wolvepack_name');
            if (saved) {
                document.getElementById('wolfName').value = saved;
            }
        }

        document.getElementById('wolfName').addEventListener('change', (e) => {
            localStorage.setItem('wolvepack_name', e.target.value);
            updateLeaderboard();
        });

        // Load and display steps
        function loadSteps() {
            const today = new Date().toISOString().split('T')[0];
            const steps = parseInt(localStorage.getItem('wolvepack_steps_' + today) || '0');
            updateDisplay(steps);
        }

        function updateDisplay(steps) {
            document.getElementById('stepsCount').textContent = steps.toLocaleString();
            
            const percent = Math.min(Math.round((steps / GOAL) * 100), 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';

            updateWolfMessages(steps);
        }

        // Add steps manually
        function addSteps() {
            const input = document.getElementById('stepInput');
            const add = parseInt(input.value);
            
            if (isNaN(add) || add <= 0) {
                alert('Please enter a valid number');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            const current = parseInt(localStorage.getItem('wolvepack_steps_' + today) || '0');
            const newTotal = current + add;
            
            localStorage.setItem('wolvepack_steps_' + today, newTotal.toString());
            localStorage.setItem('wolvepack_last_sync', new Date().toISOString());
            
            input.value = '';
            loadSteps();
            updateLeaderboard();
        }

        // Reset steps
        function resetSteps() {
            if (confirm('Reset today\'s steps?')) {
                const today = new Date().toISOString().split('T')[0];
                localStorage.removeItem('wolvepack_steps_' + today);
                loadSteps();
                updateLeaderboard();
            }
        }

        // Open sync helper
        function openSync() {
            window.location.href = './sync.html';
        }

        // Wolf messages based on progress
        function updateWolfMessages(steps) {
            let messages = [];
            
            if (steps === 0) {
                messages = ['WAKE UP!', 'LET\'S GO!', 'MOVE!'];
            } else if (steps < 2500) {
                messages = ['HUNT!', 'PUSH!', 'RUN!'];
            } else if (steps < 5000) {
                messages = ['FASTER!', 'BREATHE!', 'GO!'];
            } else if (steps < 7500) {
                messages = ['STRONG!', 'FIERCE!', 'ROAR!'];
            } else if (steps < 10000) {
                messages = ['GLORY!', 'POWER!', 'APEX!'];
            } else {
                messages = ['LEGEND!', 'ALPHA!', 'KING!'];
            }

            document.getElementById('wolf1Msg').textContent = messages[0];
            document.getElementById('wolf2Msg').textContent = messages[1];
            document.getElementById('wolf3Msg').textContent = messages[2];
        }

        // Pack messages
        function updatePackMessages() {
            const messages = [
                '💚 Your pack believes in you!',
                '🐺 The pack runs together!',
                '⚡ You\'re getting stronger!',
                '👥 Your pack sees your effort!',
                '🔥 Keep the momentum going!',
                '💪 Every step counts, wolf!',
                '🏃 The pack runs with you!',
                '🌙 Howl at the moon, runner!',
                '⚡ Pure pack power right here!',
                '🐺 Strength in numbers!'
            ];

            const msg = messages[Math.floor(Math.random() * messages.length)];
            document.getElementById('packMsg').textContent = msg;
        }

        // Leaderboard
        function updateLeaderboard() {
            const today = new Date().toISOString().split('T')[0];
            const yourName = document.getElementById('wolfName').value || 'You';
            const yourSteps = parseInt(localStorage.getItem('wolvepack_steps_' + today) || '0');

            let packData = JSON.parse(localStorage.getItem('wolvepack_pack') || '{}');
            let yourCode = localStorage.getItem('wolvepack_code');
            
            if (!yourCode) {
                yourCode = generateCode();
                localStorage.setItem('wolvepack_code', yourCode);
            }

            document.getElementById('yourCode').textContent = yourCode;

            packData[yourCode] = {
                name: yourName,
                steps: yourSteps,
                date: today
            };

            localStorage.setItem('wolvepack_pack', JSON.stringify(packData));

            const sorted = Object.entries(packData)
                .filter(([, data]) => data.date === today)
                .sort((a, b) => b[1].steps - a[1].steps);

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = sorted.map(([code, data], i) => {
                const emoji = ['🥇', '🥈', '🥉'][i] || '•';
                const isYou = code === yourCode ? ' you' : '';
                return `<div class="leaderboard-item${isYou}">
                    <span>${emoji} ${data.name}</span>
                    <span>${data.steps.toLocaleString()} steps</span>
                </div>`;
            }).join('');
        }

        // Code generation and sharing
        function generateCode() {
            return 'WOLF' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }

        function copyCode() {
            const code = document.getElementById('yourCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied: ' + code);
            });
        }

        function shareCode() {
            const code = document.getElementById('yourCode').textContent;
            const yourName = document.getElementById('wolfName').value || 'A Wolf';
            const today = new Date().toISOString().split('T')[0];
            const steps = parseInt(localStorage.getItem('wolvepack_steps_' + today) || '0');
            
            const text = `🐺 ${yourName} has ${steps} steps! Join the pack: ${code}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'WolvePack',
                    text: text
                });
            } else {
                alert(text);
            }
        }

        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
