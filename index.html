<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 WolvePack - Run With Your Pack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #ff6b35;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }

        .wolf-header {
            text-align: center;
            margin-bottom: 20px;
            animation: growl 0.6s ease-in-out;
        }

        @keyframes growl {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .wolf-header h1 {
            font-size: 2.5em;
            color: #ff6b35;
            text-shadow: 0 0 10px rgba(255, 107, 53, 0.8);
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .wolf-header p {
            color: #ffd700;
            font-style: italic;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Wolf Companions */
        .wolf-pack {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 150px;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }

        .wolf {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .wolf-body {
            font-size: 3em;
            animation: howl 2s infinite ease-in-out;
            filter: drop-shadow(0 0 5px rgba(255, 107, 53, 0.6));
        }

        .wolf:nth-child(1) .wolf-body {
            animation-delay: 0s;
        }

        .wolf:nth-child(2) .wolf-body {
            animation-delay: 0.3s;
            font-size: 3.5em;
        }

        .wolf:nth-child(3) .wolf-body {
            animation-delay: 0.6s;
        }

        @keyframes howl {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-10px) scaleY(1.1); }
        }

        .wolf-speech {
            background: rgba(255, 107, 53, 0.9);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7em;
            text-align: center;
            margin-top: 8px;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid #ff6b35;
            max-width: 90px;
            line-height: 1.2;
        }

        .wolf:nth-child(2) .wolf-speech {
            background: rgba(255, 215, 0, 0.9);
            color: #000;
            border-color: #ffd700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255, 107, 53, 0.15);
            border: 2px solid #ff6b35;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 107, 53, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        .stat-card h3 {
            color: #ffd700;
            font-size: 0.8em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b35;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ff6b35;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffd700);
            width: 0%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #000;
            font-size: 0.8em;
        }

        .setup-section {
            margin: 20px 0;
        }

        .setup-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .setup-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff6b35;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            font-size: 1em;
        }

        .setup-section input::placeholder {
            color: #999;
        }

        .setup-section input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #ff8a50);
            color: #fff;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border: 2px solid #ffd700;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        #setupScreen {
            display: block;
        }

        #mainContent {
            display: none;
        }

        #mainContent.active {
            display: block;
        }

        .permission-section {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        .permission-section p {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0 15px 0;
            border-bottom: 2px solid #ff6b35;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #fff;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            border-bottom-color: #ff6b35;
            color: #ff6b35;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .leaderboard {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .leaderboard h3 {
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            border-left: 3px solid #ff6b35;
        }

        .leaderboard-entry.self {
            background: rgba(255, 215, 0, 0.15);
            border-left-color: #ffd700;
            font-weight: bold;
        }

        .code-section {
            background: rgba(255, 107, 53, 0.1);
            border: 2px dashed #ffd700;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .code-section .code {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b35;
            letter-spacing: 3px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .motivational {
            text-align: center;
            color: #ff6b35;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .wolf-header h1 {
                font-size: 2em;
            }

            .wolf-pack {
                height: 120px;
            }

            .wolf-body {
                font-size: 2.5em;
            }

            .wolf:nth-child(2) .wolf-body {
                font-size: 3em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wolf-header">
            <div style="font-size: 3em;">🐺</div>
            <h1>WOLVEPACK</h1>
            <p>Run With Your Pack. Hunt With Purpose.</p>
        </div>

        <!-- Setup Screen -->
        <div id="setupScreen">
            <div class="setup-section">
                <label>Choose Your Wolf Name</label>
                <input type="text" id="usernameInput" placeholder="Enter your wolf name" maxlength="20">
            </div>

            <div class="permission-section">
                <p>🐺 The pack needs permission to sense your steps</p>
                <button class="btn-primary" onclick="requestPermissions()">🔓 GRANT PERMISSION</button>
            </div>

            <button class="btn-primary" onclick="startPack()">🐺 ENTER THE PACK</button>
        </div>

        <!-- Main Content -->
        <div id="mainContent">
            <!-- Animated Wolves -->
            <div class="wolf-pack">
                <div class="wolf">
                    <div class="wolf-body">🐺</div>
                    <div class="wolf-speech" id="wolf1Speech">HUNT!</div>
                </div>
                <div class="wolf">
                    <div class="wolf-body">🐺</div>
                    <div class="wolf-speech" id="wolf2Speech">PUSH!</div>
                </div>
                <div class="wolf">
                    <div class="wolf-body">🐺</div>
                    <div class="wolf-speech" id="wolf3Speech">MOVE!</div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>👣 Today's Steps</h3>
                    <div class="number" id="todaySteps">0</div>
                </div>
                <div class="stat-card">
                    <h3>🏆 Goal</h3>
                    <div class="number" id="goalSteps">10k</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>

            <!-- Motivational Message from Wolves -->
            <div class="motivational" id="motivational">The pack believes in you!</div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('status')">📊 Status</button>
                <button class="tab-btn" onclick="switchTab('pack')">🐺 Pack</button>
                <button class="tab-btn" onclick="switchTab('manual')">✏️ Log</button>
            </div>

            <div id="status" class="tab-content active">
                <div class="stat-card">
                    <h3>⏱️ Time Tracking</h3>
                    <div class="number" id="timeTracking">00:00</div>
                </div>
                <div class="stat-card">
                    <h3>📈 Daily Avg</h3>
                    <div class="number" id="dailyAvg">0</div>
                </div>
            </div>

            <div id="pack" class="tab-content">
                <div class="code-section">
                    <label>Your Pack Code</label>
                    <div class="code" id="packCode">LOAD</div>
                    <button class="btn-secondary" onclick="copyCode()">📋 Copy</button>
                </div>
                <label style="color: #ffd700; display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.8em;">Join Another Pack</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="joinCode" placeholder="Pack code" maxlength="6" style="flex: 1; padding: 10px; border: 2px solid #ff6b35; background: rgba(255,255,255,0.1); color: #fff; border-radius: 8px;">
                    <button class="btn-primary" onclick="joinPack()" style="flex: 0 0 70px; margin: 0;">JOIN</button>
                </div>
                <div class="leaderboard" style="margin-top: 20px;">
                    <h3>🏆 Pack Rankings</h3>
                    <div id="leaderboardList"></div>
                </div>
            </div>

            <div id="manual" class="tab-content">
                <label style="color: #ffd700; display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.8em;">Manual Entry (if auto tracking fails)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="manualSteps" placeholder="Add steps" min="0" style="flex: 1; padding: 10px; border: 2px solid #ff6b35; background: rgba(255,255,255,0.1); color: #fff; border-radius: 8px;">
                    <button class="btn-primary" onclick="addManualSteps()" style="flex: 0 0 70px; margin: 0;">ADD</button>
                </div>
                <button class="btn-secondary" onclick="resetData()" style="margin-top: 20px;">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <script>
        const GOAL = 10000;
        const wolfMessages = [
            { 1: "HUNT!", 2: "PUSH!", 3: "MOVE!" },
            { 1: "FASTER!", 2: "BREATHE!", 3: "GO!" },
            { 1: "STRONG!", 2: "FIERCE!", 3: "ROAR!" },
            { 1: "GLORY!", 2: "POWER!", 3: "APEX!" },
            { 1: "LEGEND!", 2: "ALPHA!", 3: "KING!" }
        ];

        const motivationalMessages = [
            "🔥 The pack sees your fire!",
            "💪 You're becoming unstoppable!",
            "⚡ Lightning in your legs!",
            "🏆 This is what legends do!",
            "🌙 Even the moon howls for you!",
            "🔮 Destiny bows to your will!",
            "✨ You ARE the alpha!",
            "🎯 Perfect pace, wolf!",
            "🌟 The pack tells stories about YOU!",
            "🐺 Together we are UNSTOPPABLE!"
        ];

        let stepsSensor = null;
        let lastSteps = 0;
        let startTime = 0;

        async function requestPermissions() {
            if ('Accelerometer' in window) {
                try {
                    const permission = await navigator.permissions.query({ name: 'accelerometer' });
                    if (permission.state === 'granted' || permission.state === 'prompt') {
                        alert('🐺 Permission granted! The pack can now sense your steps.');
                        startStepTracking();
                    }
                } catch (err) {
                    console.log('Accelerometer not supported, will use manual mode');
                }
            }

            // Try Pedometer API (Android/Samsung)
            if ('Pedometer' in window) {
                try {
                    const result = await navigator.permissions.query({ name: 'pedometer' });
                    if (result.state === 'granted' || result.state === 'prompt') {
                        alert('🐺 Pedometer access granted! Your steps are being tracked.');
                        startPedometerTracking();
                    }
                } catch (err) {
                    console.log('Pedometer not available');
                }
            }

            alert('🐺 The pack is now sensing your movement!');
        }

        function startStepTracking() {
            if ('Accelerometer' in window) {
                try {
                    const accel = new Accelerometer({ frequency: 10 });
                    let stepBuffer = 0;
                    let lastMagnitude = 0;

                    accel.addEventListener('reading', () => {
                        const magnitude = Math.sqrt(
                            accel.x ** 2 + accel.y ** 2 + accel.z ** 2
                        );

                        // Simple step detection based on acceleration spikes
                        if (magnitude > 15 && lastMagnitude < 10) {
                            stepBuffer++;

                            if (stepBuffer >= 2) {
                                const current = parseInt(localStorage.getItem('todaySteps') || '0');
                                localStorage.setItem('todaySteps', current + 1);
                                stepBuffer = 0;
                                updateUI();
                            }
                        }
                        lastMagnitude = magnitude;
                    });

                    accel.start();
                } catch (err) {
                    console.log('Step tracking unavailable: ' + err);
                }
            }
        }

        function startPedometerTracking() {
            if ('Pedometer' in window && navigator.Pedometer) {
                navigator.Pedometer.query(
                    new Date(Date.now() - 86400000),
                    new Date()
                ).then(
                    function(stepCount) {
                        localStorage.setItem('todaySteps', stepCount.steps || 0);
                        updateUI();
                    }
                );
            }
        }

        function initGame() {
            const username = localStorage.getItem('wolvepackUsername');
            if (!username) {
                document.getElementById('setupScreen').style.display = 'block';
                document.getElementById('mainContent').classList.remove('active');
                return;
            }

            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');

            if (!localStorage.getItem('packCode')) {
                localStorage.setItem('packCode', Math.random().toString(36).substr(2, 6).toUpperCase());
            }

            startTime = Date.now();
            startStepTracking();
            updateUI();
            setInterval(updateUI, 1000);
            setInterval(updateWolfMessages, 3000);
        }

        function startPack() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('🐺 A wolf needs a name!');
                return;
            }

            localStorage.setItem('wolvepackUsername', username);
            localStorage.setItem('packCode', Math.random().toString(36).substr(2, 6).toUpperCase());
            localStorage.setItem('todaySteps', '0');

            initGame();
        }

        function updateUI() {
            const steps = parseInt(localStorage.getItem('todaySteps') || '0');
            const percent = Math.min((steps / GOAL) * 100, 100);

            document.getElementById('todaySteps').innerText = steps.toLocaleString();
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').innerText = Math.round(percent) + '%';

            // Update wolf messages based on progress
            updateWolfMessages(steps);

            // Update motivational message
            updateMotivational(steps);

            document.getElementById('packCode').innerText = localStorage.getItem('packCode') || 'LOAD';
        }

        function updateWolfMessages(steps = null) {
            steps = steps || parseInt(localStorage.getItem('todaySteps') || '0');
            
            let msgSet;
            if (steps < 2000) {
                msgSet = wolfMessages[0];
            } else if (steps < 5000) {
                msgSet = wolfMessages[1];
            } else if (steps < 8000) {
                msgSet = wolfMessages[2];
            } else if (steps < GOAL) {
                msgSet = wolfMessages[3];
            } else {
                msgSet = wolfMessages[4];
            }

            document.getElementById('wolf1Speech').innerText = msgSet[1];
            document.getElementById('wolf2Speech').innerText = msgSet[2];
            document.getElementById('wolf3Speech').innerText = msgSet[3];
        }

        function updateMotivational(steps) {
            let message;
            
            if (steps === 0) {
                message = "🐺 The hunt begins. Take the first step!";
            } else if (steps < 2000) {
                message = "🐺 The pack is with you. Keep moving!";
            } else if (steps < 5000) {
                message = "🐺 Good pace! Your legs are fire!";
            } else if (steps < 8000) {
                message = "🐺 YOU'RE CRUSHING IT! Keep that fire!";
            } else if (steps < GOAL) {
                message = "🐺 ALMOST THERE! The pack roars for you!";
            } else {
                message = "🐺🔥 LEGENDARY! YOU ARE THE ALPHA! 🔥🐺";
            }

            document.getElementById('motivational').innerText = message;
        }

        function addManualSteps() {
            const steps = parseInt(document.getElementById('manualSteps').value) || 0;
            if (steps <= 0) {
                alert('🐺 Enter steps to log!');
                return;
            }

            let current = parseInt(localStorage.getItem('todaySteps') || '0');
            localStorage.setItem('todaySteps', current + steps);
            document.getElementById('manualSteps').value = '';

            updateUI();
            alert(`🐺 +${steps} steps logged! The pack feels your power!`);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        function copyCode() {
            const code = localStorage.getItem('packCode');
            navigator.clipboard.writeText(code).then(() => {
                alert(`🐺 Code copied: ${code}`);
            });
        }

        function joinPack() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            if (!code) return;
            alert(`🐺 Joined pack ${code}!`);
            document.getElementById('joinCode').value = '';
        }

        function resetData() {
            if (confirm('🐺 Reset all data? This cannot be undone!')) {
                localStorage.setItem('todaySteps', '0');
                updateUI();
            }
        }

        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
